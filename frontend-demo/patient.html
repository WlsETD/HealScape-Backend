<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HealScape Pro - Demo Patient</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .animate-in { animation-duration: 0.5s; animation-fill-mode: both; }
    .fade-in { animation-name: fadeIn; }
    .zoom-in { animation-name: zoomIn; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="phone-header">
      <div class="flex items-center gap-3">
        <span>HealScape Monitor</span>
        <button onclick="document.body.classList.toggle('pc-mode')" class="text-slate-400 hover:text-teal-600 transition-colors">
          <i class="fas fa-desktop"></i>
        </button>
      </div>
      <span>Live Tracking</span>
    </div>
    <main id="patient-app" class="app-content"></main>
    <div id="modalWrap" class="fixed inset-0 z-[2000] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md hidden"></div>
    <div id="toastWrap"></div>
  </div>

  <!-- 使用 Mock 核心 -->
  <script src="js/mock-api.js"></script>
  <!-- 使用本地複製的業務邏輯 -->
  <script src="js/patient.js"></script>
</body>
</html>
